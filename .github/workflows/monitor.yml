name: CCC Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "*/60 * * * *"   # كل ساعة (مجاني وآمن)

jobs:
  report:
    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      # 🔥 FIRMS
      FIRMS_MAP_KEY: ${{ secrets.FIRMS_MAP_KEY }}
      DEBUG_FIRMS: "1"

      # خيارات FIRMS (اختياري)
      FIRMS_SOURCE: "VIIRS_SNPP_NRT"
      FIRMS_WINDOW_HOURS: "24"
      FIRMS_DAY_RANGE: "1"
      FIRMS_BORDER_BUFFER_DEG: "1.2"
      FIRMS_ALERT_RADIUS_KM: "120"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install -r requirements.txt

      - name: Run CCC Monitor
        run: |
          python main.py
