name: CCC Monitor

on:
  workflow_dispatch: {}
  schedule:
    # كل 90 دقيقة: 00:00, 01:30, 03:00 ... (UTC)
    - cron: "0 */3 * * *"
    - cron: "30 */3 * * *"

permissions:
  contents: write

concurrency:
  group: ccc-monitor
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install requests; fi

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          # إذا عندك AIS Key (اختياري)
          AISHUB_API_KEY: ${{ secrets.AISHUB_API_KEY }}

          # إذا عندك مفاتيح إضافية (اختياري) أضفها هنا بنفس الأسلوب
          # SOME_OTHER_KEY: ${{ secrets.SOME_OTHER_KEY }}
        run: |
          python main.py

      - name: Commit state updates (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: update monitor state"
          git push
