name: AIS Monitor

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"   # كل ساعة

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install --upgrade pip && pip install websocket-client requests

      - name: Run AIS monitor
        run: python mon_ais.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          AISSTREAM_API_KEY: ${{ secrets.AISSTREAM_API_KEY }}
